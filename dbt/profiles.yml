air_traffic_pulse_dbt:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Path is relative to the directory where you invoke dbt (repo root when
      # using --project-dir dbt --profiles-dir dbt from the Makefile).
      path: data/air_traffic_pulse.duckdb
      # All dbt models land in the "dbt" DuckDB schema (not "raw").
      schema: dbt
      threads: 4
