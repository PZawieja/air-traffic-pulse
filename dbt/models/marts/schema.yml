version: 2

models:
  # ── metricflow_time_spine ─────────────────────────────────────────────────
  - name: metricflow_time_spine
    description: >
      Continuous daily date spine required by the MetricFlow semantic layer.
      Not used directly by the Streamlit dashboard.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        description: One row per calendar day from 2020-01-01 onwards.
        granularity: day
        tests:
          - not_null
          - unique

  # ── mart_latest_snapshot_by_bbox ─────────────────────────────────────────
  - name: mart_latest_snapshot_by_bbox
    description: >
      One row per bounding-box preset showing aircraft statistics for the
      most recent ingestion snapshot.  Primary source for the Streamlit
      Overview table.
    columns:
      - name: bbox_name
        description: Named bounding-box preset (e.g. berlin, frankfurt, london, warsaw).
        tests:
          - unique
          - not_null

      - name: snapshot_ingestion_ts
        description: UTC timestamp of the latest ingestion snapshot for this bbox.
        tests:
          - not_null

      - name: aircraft_count
        description: Number of distinct aircraft observed in the latest snapshot.
        tests:
          - not_null

      - name: positioned_aircraft_count
        description: Aircraft with a valid GPS/ADS-B position fix.
        tests:
          - not_null

      - name: on_ground_count
        description: Aircraft reporting ground contact in the latest snapshot.
        tests:
          - not_null

      - name: avg_velocity_mps
        description: >
          Mean ground speed in m/s across all aircraft in the latest snapshot.
          NULL if no velocity data is available.

  # ── mart_traffic_timeseries_5min ─────────────────────────────────────────
  - name: mart_traffic_timeseries_5min
    description: >
      Traffic intensity per bounding-box in 5-minute buckets.
      Each row represents one 5-minute window for one bbox.
      Primary source for the Streamlit timeseries chart.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - bbox_name
              - bucket_ts
    columns:
      - name: bbox_name
        description: Named bounding-box preset.
        tests:
          - not_null

      - name: bucket_ts
        description: >
          Start of the 5-minute window (truncated from ingestion_ts).
          Each value is aligned to 00, 05, 10 … 55 minutes past the hour.
        tests:
          - not_null

      - name: aircraft_count
        description: Distinct aircraft observed within this 5-minute window.
        tests:
          - not_null

      - name: positioned_aircraft_count
        description: Aircraft with a valid position fix within this window.
        tests:
          - not_null

  # ── mart_latest_ingestion_run ─────────────────────────────────────────────
  - name: mart_latest_ingestion_run
    description: >
      Single-row model exposing the most recent ingestion run.
      Drives the "last run" metric strip in the Streamlit dashboard.
    columns:
      - name: run_id
        description: UUID of the most recent run.
        tests:
          - not_null

      - name: started_at
        description: UTC timestamp when the run began.
        tests:
          - not_null

      - name: status
        description: "Final state of the run: running, success, or failed."
        tests:
          - not_null

      - name: records_loaded
        description: Total rows loaded in this run.
        tests:
          - not_null

      - name: run_duration_seconds
        description: Wall-clock duration in seconds. NULL if the run never finished.

  # ── mart_traffic_baseline_28d ────────────────────────────────────────────────
  - name: mart_traffic_baseline_28d
    description: >
      Rolling 28-day population statistics per bounding-box.
      Provides the baseline mean and standard deviation used to compute
      z-scores in mart_traffic_anomalies_5min.
      One row per bbox_name; rebuilt on every dbt run so the window stays current.
    columns:
      - name: bbox_name
        description: Bounding-box region name.
        tests:
          - unique
          - not_null

      - name: baseline_mean_aircraft
        description: Mean aircraft count across all 5-minute buckets in the trailing 28-day window.
        tests:
          - not_null

      - name: baseline_std_aircraft
        description: >
          Population standard deviation of aircraft_count.
          0 when there is only one data point in the window.
        tests:
          - not_null

      - name: baseline_mean_positioned
        description: Mean GPS-positioned aircraft count over the trailing window.
        tests:
          - not_null

      - name: baseline_std_positioned
        description: Population standard deviation of positioned_aircraft_count. 0 when insufficient data.
        tests:
          - not_null

      - name: n_buckets
        description: Number of 5-minute buckets used to compute the baseline.
        tests:
          - not_null

  # ── mart_traffic_anomalies_5min ──────────────────────────────────────────────
  - name: mart_traffic_anomalies_5min
    description: >
      Z-score enriched version of mart_traffic_timeseries_5min.
      Each row adds the 28-day baseline context, the computed z-scores, and an
      is_anomaly flag based on |z| ≥ 3.
      Same grain as mart_traffic_timeseries_5min: one row per (bbox_name, bucket_ts).
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - bbox_name
              - bucket_ts
    columns:
      - name: bbox_name
        description: Bounding-box region name.
        tests:
          - not_null

      - name: bucket_ts
        description: Start of the 5-minute bucket (UTC).
        tests:
          - not_null

      - name: z_aircraft
        description: >
          Z-score of aircraft_count relative to the 28-day baseline.
          NULL when baseline_std_aircraft = 0 (insufficient history).

      - name: z_positioned
        description: >
          Z-score of positioned_aircraft_count relative to the 28-day baseline.
          NULL when baseline_std_positioned = 0.

      - name: is_anomaly
        description: >
          TRUE when |z_aircraft| ≥ 3 or |z_positioned| ≥ 3.
          FALSE (not NULL) when z-scores are NULL (no anomaly declared without sufficient baseline).
        tests:
          - not_null

      - name: anomaly_direction
        description: "'spike' when z_aircraft ≥ 3; 'drop' when z_aircraft ≤ −3; NULL otherwise."

  # ── mart_latest_insights_by_bbox ─────────────────────────────────────────────
  - name: mart_latest_insights_by_bbox
    description: >
      One insight row per bounding-box combining the latest observed counts,
      the 28-day statistical baseline, the z-score for the most recent bucket,
      a 1-hour momentum indicator (trend_1h_pct), and a Traffic Health Score.
      Primary consumer: Streamlit Insights table.
    tests:
      - dbt_utils.expression_is_true:
          expression: >
            traffic_health_score is null
            OR (traffic_health_score >= 0 AND traffic_health_score <= 100)
    columns:
      - name: bbox_name
        description: Bounding-box region name.
        tests:
          - unique
          - not_null

      - name: latest_bucket_ts
        description: Timestamp of the most recent 5-minute bucket for this bbox.
        tests:
          - not_null

      - name: latest_aircraft_count
        description: Aircraft count in the most recent bucket.
        tests:
          - not_null

      - name: baseline_mean_aircraft
        description: 28-day rolling mean aircraft count used as the anomaly baseline.

      - name: latest_z_aircraft
        description: Z-score for the latest bucket. NULL when baseline std = 0.

      - name: latest_is_anomaly
        description: Whether the most recent bucket is flagged as anomalous.
        tests:
          - not_null

      - name: latest_anomaly_direction
        description: "'spike', 'drop', or NULL for the most recent bucket."

      - name: trend_1h_pct
        description: >
          Percent change between the latest aircraft count and the average of
          the preceding 12 buckets (1 hour).  NULL when insufficient data.

      - name: traffic_health_score
        description: >
          Integer score 0–100 summarising how close current traffic is to its
          normal range.  100 = perfectly normal; 0 = extreme deviation.
          Derived from the baseline deviation via exponential decay so that
          larger deviations reduce the score quickly.
          NULL when z_aircraft is unavailable (insufficient baseline history).

      - name: traffic_health_label
        description: >
          Plain-language label for traffic_health_score:
          'Excellent' (≥ 90), 'Good' (70–89), 'Watch' (40–69), 'Investigate' (< 40).
          NULL when traffic_health_score is NULL.
        tests:
          - accepted_values:
              arguments:
                values: ['Excellent', 'Good', 'Watch', 'Investigate']
