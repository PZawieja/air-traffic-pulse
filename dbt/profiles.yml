air_traffic_pulse_dbt:
  target: dev
  outputs:
    dev:
      type: duckdb
      # DUCKDB_PATH env var lets callers (make demo, CI) point at a different
      # database file without editing this file.  Falls back to the default.
      path: "{{ env_var('DUCKDB_PATH', 'data/air_traffic_pulse.duckdb') }}"
      schema: dbt
      threads: 4
